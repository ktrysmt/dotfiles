# Global mise configuration
# Symlink to: ~/.config/mise/config.toml
# Apply with: mise install

[tools]
go = "1.25"
bun = "latest"
node = "latest"

# Language tools
ruff = "latest"
uv = "latest"

# Editor
neovim = "latest"

# CLI tools (version switchable)
ripgrep = "latest"
fzf = "latest"
fd  = "10.3"
bat = "latest"
eza = "latest"
gh = "latest"
ghq = "latest"
delta = "latest"
jq = "latest"
glow = "latest"
xh = "latest"
buf = "latest"
pinact = "latest"
peco = "latest"

# CLI tools (aqua/github backend)
"aqua:Wilfred/difftastic" = "latest"
"aqua:ynqa/jnv" = "latest"
"aqua:sxyazi/yazi" = "latest"
"aqua:rossmacarthur/sheldon" = "latest"
"github:dalance/procs" = "latest"
"github:sudorandom/fauxrpc" = "latest" # grpc mock

# npm tools
"npm:diff-so-fancy" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:pnpm" = "latest"
"npm:memd-cli" = "latest"
"npm:@devcontainers/cli" = "latest"
"npm:@anthropic-ai/sandbox-runtime" = "latest"
